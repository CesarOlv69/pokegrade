<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PokeGrade" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>PokeGrade</title>

  <!-- Manifest inline via base64 blob -->
  <script>
    const manifest = {
      name: "PokeGrade — AI Card Grader",
      short_name: "PokeGrade",
      start_url: ".",
      display: "standalone",
      background_color: "#0a0a0a",
      theme_color: "#0a0a0a",
      orientation: "portrait",
      icons: [{ src: generateIcon(), sizes: "192x192", type: "image/png" }]
    };
    function generateIcon() {
      const c = document.createElement('canvas');
      c.width = c.height = 192;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, 192, 192);
      ctx.beginPath();
      ctx.arc(96, 96, 80, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a1a';
      ctx.fill();
      ctx.strokeStyle = '#e8d5a3';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(96, 96, 50, Math.PI, 0);
      ctx.strokeStyle = '#e8d5a3';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(46, 96); ctx.lineTo(146, 96);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(96, 96, 14, 0, Math.PI * 2);
      ctx.fillStyle = '#0a0a0a';
      ctx.fill();
      ctx.strokeStyle = '#e8d5a3';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = 'bold 22px sans-serif';
      ctx.fillStyle = '#e8d5a3';
      ctx.textAlign = 'center';
      ctx.fillText('PG', 96, 138);
      return c.toDataURL('image/png');
    }
    document.addEventListener('DOMContentLoaded', () => {
      const icon = generateIcon();
      manifest.icons[0].src = icon;
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
      const url = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = url;
      document.head.appendChild(link);
      const appleIcon = document.createElement('link');
      appleIcon.rel = 'apple-touch-icon';
      appleIcon.href = icon;
      document.head.appendChild(appleIcon);
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      --text: #f0ede8; --text2: rgba(240,237,232,0.55); --text3: rgba(240,237,232,0.28);
      --gold: #e8d5a3; --gold2: #c9a84c;
      --green: #4ade80; --blue: #60a5fa; --orange: #fb923c; --red: #f87171;
      --safe: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow-x: hidden; }

    .app { min-height: 100dvh; display: flex; flex-direction: column; padding-bottom: calc(20px + var(--safe)); }

    /* HEADER */
    .header { padding: 52px 24px 20px; display: flex; align-items: flex-end; justify-content: space-between; }
    .logo-tag { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--gold2); letter-spacing: .12em; }
    .logo-name { font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
    .logo-name span { color: var(--gold); }
    .history-btn { background: var(--bg3); border: .5px solid var(--border2); border-radius: 10px; padding: 8px 14px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text2); cursor: pointer; letter-spacing: .08em; }

    /* UPLOAD */
    .upload-section { padding: 0 24px; }
    .upload-zone { position: relative; border: 1.5px dashed var(--border2); border-radius: 20px; background: var(--bg2); cursor: pointer; min-height: 240px; display: flex; align-items: center; justify-content: center; transition: border-color .2s; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    .upload-inner { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 32px; pointer-events: none; }
    .upload-icon { width: 56px; height: 56px; border: 1px solid var(--border2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--bg3); }
    .upload-inner h2 { font-size: 17px; font-weight: 700; }
    .upload-inner p { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: .06em; text-align: center; line-height: 1.8; }

    /* CARD VIEW */
    .card-view { display: none; flex-direction: column; flex: 1; padding: 0 24px; gap: 16px; }
    .card-view.visible { display: flex; }
    .card-frame { border-radius: 20px; overflow: hidden; background: #000; position: relative; }
    .card-frame img { width: 100%; display: block; object-fit: contain; max-height: 300px; }
    .corner { position: absolute; width: 18px; height: 18px; border-color: var(--gold); border-style: solid; opacity: .7; }
    .tl { top:10px; left:10px; border-width:2px 0 0 2px; }
    .tr { top:10px; right:10px; border-width:2px 2px 0 0; }
    .bl { bottom:10px; left:10px; border-width:0 0 2px 2px; }
    .br { bottom:10px; right:10px; border-width:0 2px 2px 0; }
    .actions { display: flex; gap: 10px; }
    .btn-main { flex:1; padding:16px; background:var(--gold); border:none; border-radius:14px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:#0a0a0a; cursor:pointer; transition:transform .1s,opacity .15s; }
    .btn-main:active { transform:scale(.97); }
    .btn-main:disabled { opacity:.4; }
    .btn-reset { padding:16px 18px; background:var(--bg3); border:.5px solid var(--border2); border-radius:14px; font-size:18px; cursor:pointer; }

    /* LOADING */
    .loading { display:none; background:var(--bg2); border:.5px solid var(--border); border-radius:20px; padding:28px 24px; flex-direction:column; align-items:center; gap:14px; }
    .loading.visible { display:flex; }
    .scan-track { width:100%; height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; }
    .scan-bar { height:100%; width:40%; background:linear-gradient(90deg,transparent,var(--gold),transparent); animation:scan 1.4s ease-in-out infinite; }
    @keyframes scan { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
    .loading-lbl { font-family:'Space Mono',monospace; font-size:11px; color:var(--gold2); letter-spacing:.1em; text-transform:uppercase; }
    .steps { width:100%; display:flex; flex-direction:column; gap:7px; }
    .step { font-family:'Space Mono',monospace; font-size:10px; color:var(--text3); display:flex; align-items:center; gap:8px; transition:color .3s; }
    .step.active { color:var(--text2); }
    .step.done { color:var(--green); }
    .dot { width:5px; height:5px; border-radius:50%; background:var(--border2); flex-shrink:0; transition:background .3s; }
    .step.active .dot { background:var(--gold); }
    .step.done .dot { background:var(--green); }

    /* RESULTS */
    .results { display:none; flex-direction:column; gap:12px; }
    .results.visible { display:flex; }

    .grade-hero { background:var(--bg2); border:.5px solid var(--border); border-radius:20px; padding:22px; display:flex; align-items:center; gap:18px; }
    .grade-ring { width:76px; height:76px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; border:2px solid; }
    .g-num { font-size:24px; font-weight:800; line-height:1; }
    .g-ten { font-family:'Space Mono',monospace; font-size:9px; opacity:.5; }
    .r-mint { border-color:var(--green); background:rgba(74,222,128,.08); color:var(--green); }
    .r-nm   { border-color:var(--blue);  background:rgba(96,165,250,.08); color:var(--blue);  }
    .r-ex   { border-color:var(--orange);background:rgba(251,146,60,.08); color:var(--orange);}
    .r-poor { border-color:var(--red);   background:rgba(248,113,113,.08);color:var(--red);   }
    .grade-lbl { font-size:17px; font-weight:700; }
    .grade-psa { font-family:'Space Mono',monospace; font-size:11px; color:var(--gold2); letter-spacing:.08em; margin-top:3px; }
    .badge { margin-top:9px; display:inline-flex; align-items:center; gap:5px; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.06em; padding:4px 10px; border-radius:6px; }
    .badge-yes { background:rgba(74,222,128,.12); color:var(--green); }
    .badge-no  { background:rgba(248,113,113,.12); color:var(--red); }

    .crit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .crit { background:var(--bg2); border:.5px solid var(--border); border-radius:16px; padding:14px; }
    .crit-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
    .crit-lbl { font-family:'Space Mono',monospace; font-size:9px; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; }
    .crit-sc { font-size:18px; font-weight:800; }
    .crit-bar-t { height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; margin-bottom:7px; }
    .crit-bar-f { height:100%; border-radius:2px; }
    .crit-note { font-size:11px; color:var(--text2); line-height:1.5; }

    .center-card { background:var(--bg2); border:.5px solid var(--border); border-radius:16px; padding:18px; }
    .section-lbl { font-family:'Space Mono',monospace; font-size:9px; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:14px; }
    .center-visual { display:flex; justify-content:center; margin-bottom:14px; }
    .card-sim { width:88px; height:122px; border:1px solid var(--border2); border-radius:6px; position:relative; background:var(--bg3); }
    .card-inner { border:1.5px solid var(--gold2); border-radius:3px; position:absolute; background:rgba(232,213,163,.05); }
    .ratio-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .ratio-axis { font-family:'Space Mono',monospace; font-size:9px; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
    .ratio-track { height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; margin-bottom:3px; }
    .ratio-fill { height:100%; border-radius:2px; }
    .ratio-val { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:var(--text); }

    .verdict-card { background:var(--bg2); border:.5px solid var(--border); border-radius:16px; padding:18px; }
    .verdict-txt { font-size:13px; color:var(--text2); line-height:1.7; }
    .vl-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
    .vl h4 { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:5px; }
    .vl.pros h4 { color:var(--green); }
    .vl.cons h4 { color:var(--red); }
    .vl ul { list-style:none; display:flex; flex-direction:column; gap:4px; }
    .vl ul li { font-size:11px; color:var(--text2); padding-left:12px; position:relative; line-height:1.4; }
    .vl ul li::before { content:'–'; position:absolute; left:0; }
    .pros li::before { color:var(--green); }
    .cons li::before { color:var(--red); }

    .err { background:rgba(248,113,113,.08); border:.5px solid rgba(248,113,113,.25); border-radius:16px; padding:20px; font-size:13px; color:var(--red); line-height:1.6; }

    /* HISTORY */
    .history-view { display:none; flex-direction:column; flex:1; padding:0 24px; }
    .history-view.visible { display:flex; }
    .hist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .hist-header h2 { font-size:18px; font-weight:700; }
    .back-btn { font-family:'Space Mono',monospace; font-size:10px; color:var(--gold2); background:none; border:none; cursor:pointer; letter-spacing:.08em; }
    .hist-list { display:flex; flex-direction:column; gap:10px; }
    .hist-item { background:var(--bg2); border:.5px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:14px; }
    .hist-thumb { width:38px; height:54px; border-radius:4px; object-fit:cover; background:var(--bg3); flex-shrink:0; }
    .hist-info { flex:1; overflow:hidden; }
    .hist-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
    .hist-date { font-family:'Space Mono',monospace; font-size:9px; color:var(--text3); letter-spacing:.06em; }
    .hist-grade { font-size:22px; font-weight:800; }
    .hist-empty { text-align:center; padding:48px 0; font-family:'Space Mono',monospace; font-size:11px; color:var(--text3); letter-spacing:.06em; line-height:2; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="logo-tag">AI Grading</div>
      <div class="logo-name">Poke<span>Grade</span></div>
    </div>
    <button class="history-btn" id="histBtn">Historique</button>
  </div>

  <div class="upload-section" id="uploadSection">
    <div class="upload-zone">
      <input type="file" accept="image/*" capture="environment" id="fileInput" />
      <div class="upload-inner">
        <div class="upload-icon">📷</div>
        <h2>Scanner une carte</h2>
        <p>PHOTO NETTE · FOND BLANC<br>LUMIÈRE NATURELLE · À PLAT</p>
      </div>
    </div>
  </div>

  <div class="card-view" id="cardView">
    <div class="card-frame">
      <img id="cardImg" src="" alt="Carte" />
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="actions">
      <button class="btn-main" id="analyzeBtn">Analyser</button>
      <button class="btn-reset" id="resetBtn">✕</button>
    </div>
    <div class="loading" id="loading">
      <div class="scan-track"><div class="scan-bar"></div></div>
      <div class="loading-lbl" id="loadLbl">Initialisation...</div>
      <div class="steps" id="steps"></div>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div class="history-view" id="histView">
    <div class="hist-header">
      <h2>Historique</h2>
      <button class="back-btn" id="backBtn">← Retour</button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<script>
const STEPS = [
  "Chargement image...", "Détection des bordures...",
  "Analyse du cadrage...", "Inspection des coins...",
  "Vérification surface...", "Calcul note globale..."
];

let b64 = null, mime = 'image/jpeg', stepIdx = 0, stepTimer = null;
let hist = JSON.parse(localStorage.getItem('pg_hist') || '[]');

const $ = id => document.getElementById(id);
const show = (el, flex=false) => { el.style.display = flex ? 'flex' : ''; };
const hide = el => { el.style.display = 'none'; };

$('fileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  mime = f.type || 'image/jpeg';
  new FileReader().onload = ev => {
    b64 = ev.target.result.split(',')[1];
    $('cardImg').src = ev.target.result;
    hide($('uploadSection'));
    $('cardView').classList.add('visible');
    $('results').classList.remove('visible');
    $('results').innerHTML = '';
    $('loading').classList.remove('visible');
  }, new FileReader().readAsDataURL(f);
  // Fix: need proper reader
  const r = new FileReader();
  r.onload = ev => {
    b64 = ev.target.result.split(',')[1];
    $('cardImg').src = ev.target.result;
    hide($('uploadSection'));
    $('cardView').classList.add('visible');
    $('results').classList.remove('visible');
    $('results').innerHTML = '';
    $('loading').classList.remove('visible');
  };
  r.readAsDataURL(f);
});

$('resetBtn').addEventListener('click', () => {
  b64 = null; clearInterval(stepTimer);
  $('cardView').classList.remove('visible');
  show($('uploadSection'));
  $('results').classList.remove('visible');
  $('results').innerHTML = '';
  $('loading').classList.remove('visible');
  $('fileInput').value = '';
});

$('histBtn').addEventListener('click', () => {
  hide($('uploadSection'));
  $('cardView').classList.remove('visible');
  $('histView').classList.add('visible');
  renderHist();
});

$('backBtn').addEventListener('click', () => {
  $('histView').classList.remove('visible');
  if (b64) $('cardView').classList.add('visible');
  else show($('uploadSection'));
});

$('analyzeBtn').addEventListener('click', analyze);

function startLoad() {
  stepIdx = 0;
  $('loading').classList.add('visible');
  $('analyzeBtn').disabled = true;
  $('results').classList.remove('visible');
  $('results').innerHTML = '';
  $('steps').innerHTML = STEPS.map((s,i) =>
    `<div class="step" id="s${i}"><div class="dot"></div>${s}</div>`).join('');
  setStep(0);
  stepTimer = setInterval(() => {
    stepIdx++;
    if (stepIdx < STEPS.length) setStep(stepIdx); else clearInterval(stepTimer);
  }, 900);
}

function setStep(i) {
  STEPS.forEach((_,j) => {
    const el = $(`s${j}`);
    if (!el) return;
    el.className = 'step' + (j < i ? ' done' : j === i ? ' active' : '');
  });
  $('loadLbl').textContent = STEPS[i] || 'Finalisation...';
}

function stopLoad() {
  clearInterval(stepTimer);
  $('loading').classList.remove('visible');
  $('analyzeBtn').disabled = false;
}

async function analyze() {
  if (!b64) return;
  startLoad();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Expert grading cartes Pokémon TCG (standards PSA/BGS/CGC). Retourne UNIQUEMENT un JSON valide, sans backticks ni texte autour.
Structure exacte :
{"grade_global":8.5,"grade_label":"Near Mint","psa_equivalent":"PSA 8","centering":{"score":8,"left_right":"52/48","top_bottom":"55/45","note":"..."},"corners":{"score":9,"note":"..."},"edges":{"score":8,"note":"..."},"surface":{"score":9,"note":"..."},"verdict":"...","points_forts":["..."],"points_faibles":["..."],"vaut_grading":true}
Paliers PSA : 1,1.5,2,3,4,5,6,7,7.5,8,8.5,9,9.5,10. Sois précis et sévère. Si pas une carte Pokémon : grade_global null.`,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
          { type: 'text', text: 'Analyse cette carte et retourne le JSON.' }
        ]}]
      })
    });
    const data = await res.json();
    stopLoad();
    const raw = (data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    renderResults(JSON.parse(raw));
  } catch(e) {
    stopLoad();
    $('results').innerHTML = `<div class="err">Erreur — vérifie ta connexion.<br><small style="opacity:.5;font-size:10px">${e.message}</small></div>`;
    $('results').classList.add('visible');
  }
}

function col(s) {
  return s>=9?'var(--green)':s>=7?'var(--blue)':s>=5?'var(--orange)':'var(--red)';
}
function rcls(g) {
  return g>=9?'r-mint':g>=7?'r-nm':g>=5?'r-ex':'r-poor';
}
function pct(ratio, side) {
  const p = (ratio||'50/50').split('/').map(Number);
  return side===0?(p[0]||50):(p[1]||50);
}
function cfill(v) {
  const d=Math.abs(v-50);
  return d<=3?'var(--green)':d<=8?'var(--blue)':d<=15?'var(--orange)':'var(--red)';
}

function renderResults(r) {
  const el = $('results');
  if (!r.grade_global) {
    el.innerHTML = `<div class="err">${r.verdict||"Pas une carte Pokémon."}</div>`;
    el.classList.add('visible'); return;
  }
  const lrL = pct(r.centering?.left_right,0), tbT = pct(r.centering?.top_bottom,0);
  const lr = r.centering?.left_right||'50/50', tb = r.centering?.top_bottom||'50/50';
  const lrd = Math.abs(lrL-50), tbd = Math.abs(tbT-50);
  const iW = Math.max(32,88-lrd*2.5), iH = Math.max(44,118-tbd*2.5);
  const iL = (lrL/100)*(88-iW), iT = (tbT/100)*(122-iH);

  const crits = [
    {lbl:'Cadrage', d:r.centering}, {lbl:'Coins', d:r.corners},
    {lbl:'Bords', d:r.edges},       {lbl:'Surface', d:r.surface}
  ];
  const critHTML = crits.map(c=>`
    <div class="crit">
      <div class="crit-head">
        <span class="crit-lbl">${c.lbl}</span>
        <span class="crit-sc" style="color:${col(c.d.score)}">${c.d.score}</span>
      </div>
      <div class="crit-bar-t"><div class="crit-bar-f" style="width:${c.d.score*10}%;background:${col(c.d.score)}"></div></div>
      <div class="crit-note">${c.d.note}</div>
    </div>`).join('');

  const pf=(r.points_forts||[]).map(p=>`<li>${p}</li>`).join('');
  const pw=(r.points_faibles||[]).map(p=>`<li>${p}</li>`).join('');

  el.innerHTML = `
    <div class="grade-hero">
      <div class="grade-ring ${rcls(r.grade_global)}">
        <span class="g-num">${r.grade_global}</span>
        <span class="g-ten">/10</span>
      </div>
      <div>
        <div class="grade-lbl">${r.grade_label}</div>
        <div class="grade-psa">${r.psa_equivalent}</div>
        <div class="badge ${r.vaut_grading?'badge-yes':'badge-no'}">
          ${r.vaut_grading?'✓ Grading recommandé':'✕ Grading non rentable'}
        </div>
      </div>
    </div>
    <div class="crit-grid">${critHTML}</div>
    <div class="center-card">
      <div class="section-lbl">Cadrage détaillé</div>
      <div class="center-visual">
        <div class="card-sim">
          <div class="card-inner" style="width:${iW}px;height:${iH}px;left:${iL}px;top:${iT}px"></div>
        </div>
      </div>
      <div class="ratio-grid">
        <div><div class="ratio-axis">Gauche / Droite</div>
          <div class="ratio-track"><div class="ratio-fill" style="width:${lrL}%;background:${cfill(lrL)}"></div></div>
          <div class="ratio-val">${lr}</div></div>
        <div><div class="ratio-axis">Haut / Bas</div>
          <div class="ratio-track"><div class="ratio-fill" style="width:${tbT}%;background:${cfill(tbT)}"></div></div>
          <div class="ratio-val">${tb}</div></div>
      </div>
    </div>
    <div class="verdict-card">
      <div class="section-lbl">Verdict</div>
      <div class="verdict-txt">${r.verdict}</div>
      ${pf||pw?`<div class="vl-grid">
        ${pf?`<div class="vl pros"><h4>Points forts</h4><ul>${pf}</ul></div>`:''}
        ${pw?`<div class="vl cons"><h4>Points faibles</h4><ul>${pw}</ul></div>`:''}
      </div>`:''}
    </div>`;
  el.classList.add('visible');

  hist.unshift({ id:Date.now(), date:new Date().toLocaleDateString('fr-FR'),
    thumb:$('cardImg').src, grade:r.grade_global, label:r.grade_label, psa:r.psa_equivalent });
  if(hist.length>20) hist=hist.slice(0,20);
  localStorage.setItem('pg_hist', JSON.stringify(hist));
}

function renderHist() {
  const el = $('histList');
  if (!hist.length) { el.innerHTML='<div class="hist-empty">AUCUNE ANALYSE<br>POUR L\'INSTANT</div>'; return; }
  el.innerHTML = hist.map(h=>`
    <div class="hist-item">
      <img class="hist-thumb" src="${h.thumb}" alt="" />
      <div class="hist-info">
        <div class="hist-name">${h.label}</div>
        <div class="hist-date">${h.date} · ${h.psa}</div>
      </div>
      <div class="hist-grade" style="color:${col(h.grade)}">${h.grade}</div>
    </div>`).join('');
}

// Inline service worker for PWA installability
if ('serviceWorker' in navigator) {
  const sw = `
    const C='pg-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/')).then(()=>self.skipWaiting())));
    self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
    self.addEventListener('fetch',e=>{
      if(e.request.url.includes('api.anthropic')||e.request.url.includes('fonts.g'))return;
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });`;
  const blob = new Blob([sw], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
